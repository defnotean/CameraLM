<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CameraLM - Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    color-scheme: dark;
    --bg: #0d0f12;
    --panel: #15181d;
    --panel-2: #1b1f26;
    --panel-3: #222832;
    --border: #303741;
    --border-soft: #252b34;
    --text: #f6f8fb;
    --muted: #aab2bf;
    --dim: #727d8c;
    --green: #22d39a;
    --blue: #6aa7ff;
    --amber: #f2c94c;
    --red: #ff6f6f;
    --shadow: 0 18px 44px rgba(0, 0, 0, .28);
  }

  * { box-sizing: border-box; }
  html, body { min-height: 100%; overflow-x: hidden; }
  body {
    margin: 0;
    background:
      radial-gradient(circle at top left, rgba(34, 211, 154, .08), transparent 30rem),
      radial-gradient(circle at top right, rgba(106, 167, 255, .08), transparent 28rem),
      var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    letter-spacing: 0;
  }

  button, input { font: inherit; }
  button { border: 0; }
  .app {
    width: min(1500px, calc(100vw - 32px));
    margin: 0 auto;
    padding: 24px 0 32px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    margin-bottom: 18px;
  }
  .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .brand-mark {
    width: 38px; height: 38px; border-radius: 8px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    box-shadow: 0 12px 30px rgba(34, 211, 154, .16);
  }
  h1 { margin: 0; font-size: 24px; line-height: 1.1; font-weight: 700; }
  .subline { margin-top: 5px; color: var(--muted); font-size: 13px; }
  .live-dot {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); margin-right: 7px; box-shadow: 0 0 0 4px rgba(34, 211, 154, .12);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(98px, 1fr));
    gap: 10px;
    min-width: min(520px, 100%);
  }
  .stat {
    background: rgba(27, 31, 38, .82);
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .stat-value { font-size: 20px; line-height: 1; font-weight: 700; }
  .stat-label { color: var(--dim); margin-top: 5px; font-size: 11px; text-transform: uppercase; }

  .toolbar {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px;
    margin-bottom: 18px;
  }
  .search, .class-form {
    height: 42px;
    display: flex;
    align-items: center;
    background: rgba(21, 24, 29, .9);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .search svg { margin-left: 13px; color: var(--dim); flex: none; }
  .search input, .class-form input {
    width: 100%;
    min-width: 0;
    background: transparent;
    border: 0;
    color: var(--text);
    outline: 0;
    padding: 0 13px;
  }
  .search-clear {
    width: 30px;
    height: 30px;
    margin-right: 6px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    background: transparent;
    color: var(--dim);
    cursor: pointer;
  }
  .search-clear:hover { background: var(--panel-3); color: var(--text); }
  .search-clear[hidden] { display: none; }
  .search input::placeholder, .class-form input::placeholder { color: var(--dim); }
  .class-form { overflow: hidden; min-width: 300px; }
  .primary {
    height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--green);
    color: #07110d;
    font-weight: 700;
    padding: 0 14px;
    cursor: pointer;
    border-left: 1px solid rgba(0, 0, 0, .18);
    white-space: nowrap;
  }
  .primary:hover { filter: brightness(1.06); }
  .button-soft {
    height: 32px;
    padding: 0 12px;
    border-radius: 7px;
    background: var(--panel-3);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .button-soft:hover { background: var(--panel-2); color: var(--text); }

  .panel {
    background: rgba(21, 24, 29, .88);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
  }
  .panel-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .panel-title {
    margin: 0;
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
  }
  .panel-actions { display: flex; align-items: center; gap: 6px; }

  /* --- Class folder groups (collapsible) --- */
  .groups-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

  details.class-group {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .15s ease;
  }
  details.class-group[open] { border-color: rgba(106, 167, 255, .35); }
  details.unassigned-group[open] { border-color: rgba(242, 201, 76, .35); }

  details.class-group summary {
    list-style: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    user-select: none;
    outline: none;
  }
  details.class-group summary::-webkit-details-marker { display: none; }
  details.class-group summary:hover { background: rgba(255, 255, 255, .02); }
  details.class-group summary:focus-visible {
    box-shadow: inset 0 0 0 2px rgba(106, 167, 255, .55);
  }
  details.class-group summary.dragover {
    background: rgba(34, 211, 154, .10);
    outline: 1px dashed var(--green);
    outline-offset: -3px;
  }

  .chevron {
    width: 16px; height: 16px;
    color: var(--muted);
    flex: none;
    transition: transform .15s ease;
  }
  details.class-group[open] > summary .chevron { transform: rotate(90deg); }

  .group-icon {
    width: 18px; height: 18px;
    color: var(--blue);
    flex: none;
  }
  details.unassigned-group > summary .group-icon { color: var(--amber); }

  .group-name {
    flex: 1;
    min-width: 0;
    font-weight: 650;
    font-size: 15px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .group-count {
    min-width: 28px;
    height: 24px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    background: var(--panel-3);
    color: var(--muted);
    font-size: 12px;
    padding: 0 8px;
    flex: none;
  }
  .group-actions { display: flex; align-items: center; gap: 6px; flex: none; }

  .group-body {
    border-top: 1px solid var(--border-soft);
    padding: 14px 16px;
    background: rgba(13, 15, 18, .35);
  }
  .group-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 14px;
  }
  .group-empty {
    color: var(--dim);
    font-size: 13px;
    padding: 6px 2px;
  }

  /* --- Person card --- */
  .person-card {
    min-width: 0;
    overflow: hidden;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    cursor: grab;
  }
  .person-card:hover {
    border-color: rgba(106, 167, 255, .82);
    transform: translateY(-2px);
    box-shadow: 0 16px 34px rgba(0, 0, 0, .24);
  }
  .person-card.dragging { opacity: .45; cursor: grabbing; }
  .thumb-wrap {
    position: relative;
    aspect-ratio: 1 / 1;
    background: linear-gradient(135deg, #30333a, #23272f);
  }
  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb-status {
    position: absolute;
    left: 10px;
    bottom: 10px;
    background: rgba(13, 15, 18, .82);
    border: 1px solid rgba(255, 255, 255, .12);
    color: var(--muted);
    border-radius: 999px;
    padding: 4px 9px;
    font-size: 11px;
  }
  .match-pill {
    position: absolute;
    top: 10px;
    right: 10px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(13, 15, 18, .78);
    color: var(--text);
    border: 1px solid rgba(255, 255, 255, .12);
    border-radius: 999px;
    padding: 4px 8px;
    font-size: 11px;
  }
  .person-body { padding: 12px; }
  .person-title {
    display: flex;
    align-items: start;
    justify-content: space-between;
    gap: 10px;
  }
  .person-name {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 16px;
    font-weight: 700;
  }
  .person-meta { color: var(--dim); font-size: 12px; margin-top: 3px; }
  .icon-row { display: flex; gap: 3px; flex: none; }
  .icon-btn {
    width: 30px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    color: var(--muted);
    background: transparent;
    cursor: pointer;
  }
  .icon-btn:hover { background: var(--panel-3); color: var(--text); }
  .icon-btn.danger:hover { color: var(--red); background: rgba(255, 111, 111, .12); }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 26px;
    margin-top: 12px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    max-width: 100%;
    min-height: 24px;
    border-radius: 999px;
    border: 1px solid rgba(106, 167, 255, .45);
    background: rgba(106, 167, 255, .10);
    color: #cfe1ff;
    padding: 3px 8px;
    font-size: 12px;
  }
  .chip span {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chip button {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: transparent;
    color: inherit;
    cursor: pointer;
    line-height: 1;
  }
  .chip button:hover { background: rgba(255, 255, 255, .12); }
  .muted { color: var(--dim); font-size: 12px; }
  .min-0 { min-width: 0; }
  .empty {
    margin: 40px auto;
    max-width: 360px;
    color: var(--muted);
    text-align: center;
    line-height: 1.45;
    padding: 0 16px 32px;
  }

  svg { width: 16px; height: 16px; display: block; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .group-icon svg { width: 100%; height: 100%; }

  /* --- "Now" bar: the live pointer into the schedule grid below --- */
  .now-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    background: rgba(21, 24, 29, .88);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .now-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--green), var(--blue));
    color: #07110d;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    flex: none;
  }
  .now-bar .now-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .now-select {
    height: 30px;
    padding: 0 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font: inherit;
    cursor: pointer;
  }
  .now-select:focus { outline: 2px solid rgba(106, 167, 255, .55); outline-offset: 1px; }
  .now-arrow {
    color: var(--dim);
    font-size: 14px;
    flex: none;
    user-select: none;
  }
  .now-block {
    display: inline-flex;
    align-items: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    background: rgba(106, 167, 255, .12);
    border: 1px solid rgba(106, 167, 255, .25);
    border-radius: 6px;
    padding: 3px 8px;
    flex: none;
  }
  .now-class {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .now-class.empty { color: var(--dim); font-weight: 500; font-style: italic; }
  .now-count { color: var(--dim); font-size: 12px; }
  .now-spacer { flex: 1; min-width: 8px; }
  .now-toggle {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--panel);
    user-select: none;
  }
  .now-toggle:hover { background: var(--panel-2); color: var(--text); }
  .now-toggle.active {
    background: rgba(34, 211, 154, .12);
    border-color: rgba(34, 211, 154, .4);
    color: var(--text);
  }
  .now-toggle input { accent-color: var(--green); margin: 0; }
  .now-toggle[aria-disabled="true"] { opacity: .5; cursor: not-allowed; }
  .now-toggle[aria-disabled="true"] input { cursor: not-allowed; }

  .filter-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-left: 10px;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    background: rgba(34, 211, 154, .15);
    color: var(--green);
    border: 1px solid rgba(34, 211, 154, .35);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  /* --- Schedule panel (its own collapsible, sits above the identities panel) --- */
  details.schedule-panel {
    background: rgba(21, 24, 29, .88);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
    overflow: hidden;
    transition: border-color .15s ease;
  }
  details.schedule-panel[open] { border-color: rgba(34, 211, 154, .35); }
  details.schedule-panel > summary {
    list-style: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    user-select: none;
    outline: none;
  }
  details.schedule-panel > summary::-webkit-details-marker { display: none; }
  details.schedule-panel > summary:hover { background: rgba(255, 255, 255, .02); }
  details.schedule-panel > summary:focus-visible {
    box-shadow: inset 0 0 0 2px rgba(106, 167, 255, .55);
  }
  details.schedule-panel > summary .chevron {
    width: 16px; height: 16px;
    color: var(--muted);
    flex: none;
    transition: transform .15s ease;
  }
  details.schedule-panel[open] > summary .chevron { transform: rotate(90deg); }
  details.schedule-panel > summary .schedule-icon {
    width: 18px; height: 18px;
    color: var(--green);
    flex: none;
  }
  details.schedule-panel > summary .schedule-title {
    flex: 1;
    min-width: 0;
    margin: 0;
    font-size: 15px;
    font-weight: 650;
  }
  details.schedule-panel > summary .schedule-count {
    color: var(--dim);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }

  .schedule-body {
    border-top: 1px solid var(--border-soft);
    padding: 14px 16px 18px;
    overflow-x: auto;
  }
  .schedule-grid {
    width: 100%;
    border-collapse: separate;
    border-spacing: 6px;
  }
  .schedule-grid th {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .04em;
    padding: 6px 6px;
  }
  .schedule-grid thead th { text-align: center; }
  .schedule-grid tbody th {
    text-align: right;
    padding-right: 10px;
    white-space: nowrap;
    color: var(--text);
    font-size: 12px;
    font-weight: 650;
    letter-spacing: 0;
    text-transform: none;
  }
  .schedule-grid td { padding: 0; }
  .schedule-cell-wrap {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .schedule-cell-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .06em;
    font-weight: 700;
    color: var(--muted);
    padding-left: 2px;
  }
  .schedule-cell {
    width: 100%;
    min-width: 140px;
    height: 34px;
    padding: 0 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font: inherit;
    cursor: pointer;
  }
  .schedule-cell:hover { border-color: rgba(106, 167, 255, .55); }
  .schedule-cell:focus { outline: 2px solid rgba(106, 167, 255, .55); outline-offset: 1px; }
  .schedule-cell[data-empty="true"] {
    color: var(--dim);
    background: rgba(13, 15, 18, .35);
  }
  .schedule-empty {
    color: var(--dim);
    font-size: 13px;
    padding: 6px 2px;
  }

  @media (max-width: 900px) {
    .app { width: min(100vw - 24px, 760px); padding-top: 16px; }
    .topbar { align-items: stretch; flex-direction: column; }
    .stats { min-width: 0; grid-template-columns: repeat(2, 1fr); }
    .toolbar { grid-template-columns: 1fr; }
    .class-form { min-width: 0; }
    .group-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
  }
</style>
</head>
<body>
<main class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div>
        <h1>CameraLM</h1>
        <div class="subline"><span class="live-dot"></span>Local admin connected</div>
      </div>
    </div>
    <section class="stats" aria-label="Summary">
      <div class="stat"><div id="peopleCount" class="stat-value">0</div><div class="stat-label">People</div></div>
      <div class="stat"><div id="classCount" class="stat-value">0</div><div class="stat-label">Classes</div></div>
      <div class="stat"><div id="unassignedCount" class="stat-value">0</div><div class="stat-label">Unassigned</div></div>
      <div class="stat"><div id="imageCount" class="stat-value">0</div><div class="stat-label">Images</div></div>
    </section>
  </header>

  <section class="toolbar">
    <div class="search">
      <span aria-hidden="true" data-icon="search"></span>
      <input id="searchInput" autocomplete="off" aria-label="Search identities or classes" placeholder="Search identities or classes">
      <button id="searchClear" class="search-clear" type="button" title="Clear search" hidden>x</button>
    </div>
    <form id="classForm" class="class-form">
      <input id="newClassInput" autocomplete="off" placeholder="New class name">
      <button class="primary" type="submit"><span aria-hidden="true" data-icon="plus"></span>Create</button>
    </form>
  </section>

  <div class="now-bar" id="nowBar" role="group" aria-label="Current class context">
    <span class="now-pill" aria-hidden="true">Now</span>
    <label class="now-label">Day
      <select class="now-select" id="nowDay" aria-label="Current day"></select>
    </label>
    <label class="now-label">Period
      <select class="now-select" id="nowPeriod" aria-label="Current period of the day"></select>
    </label>
    <span class="now-arrow" aria-hidden="true">→</span>
    <span class="now-block" id="nowBlock">-</span>
    <span class="now-arrow" aria-hidden="true">→</span>
    <span class="now-class" id="nowClass">-</span>
    <span class="now-count" id="nowCount"></span>
    <span class="now-spacer"></span>
    <label class="now-toggle" id="nowFilterToggle" title="Show only the identities enrolled in this class">
      <input type="checkbox" id="nowFilter">
      <span>Show only this class</span>
    </label>
  </div>

  <details class="schedule-panel" id="schedulePanel">
    <summary>
      <span class="chevron" data-icon="chevron"></span>
      <span class="schedule-icon" data-icon="calendar"></span>
      <h2 class="schedule-title">Schedule</h2>
      <span class="schedule-count" id="scheduleFilled">0 / 0 filled</span>
    </summary>
    <div class="schedule-body">
      <table class="schedule-grid" id="scheduleTable">
        <thead><tr id="scheduleHeadRow"></tr></thead>
        <tbody id="scheduleBody"></tbody>
      </table>
      <div id="scheduleEmptyClasses" class="schedule-empty" hidden>
        Create a class above and it will become available in every cell.
      </div>
    </div>
  </details>

  <section class="panel">
    <div class="panel-header">
      <div style="display:flex; align-items:center; min-width:0;">
        <h2 class="panel-title">Identities by class</h2>
        <span id="filterBadge" class="filter-badge" hidden></span>
      </div>
      <div class="panel-actions">
        <button class="button-soft" type="button" data-action="expand-all">Expand all</button>
        <button class="button-soft" type="button" data-action="collapse-all">Collapse all</button>
      </div>
    </div>
    <div id="classGroups" class="groups-list"></div>
    <div id="groupsEmpty" class="empty" hidden>No matching identities.</div>
  </section>
</main>

<script>
  const $ = (sel) => document.querySelector(sel);
  const state = {
    people: [],
    classes: [],
    schedule: {},
    scheduleDims: { days: 6, blocks: ["A", "B", "C", "D"] }
  };
  let searchQuery = "";
  // What the USER has clicked open. Survives the 1.5 s poll/rebuild - without
  // this Set, every refresh would slam the folders shut.
  const expandedClasses = new Set();
  let expandedUnassigned = false;
  // While searching, every group with a matching person is auto-opened.
  // Tracked separately so clearing the search restores the manual state.
  const UNASSIGNED_KEY = "__unassigned__";
  // Schedule grid re-render is hashed: skip re-rendering when nothing relevant
  // has changed, so the 1.5 s poll can't slam an open <select> shut mid-pick.
  let lastScheduleHash = "";

  // Live "Now" pointer into the schedule grid. The user picks Day + Period; we
  // compute the Block (via the rotation) and the assigned Class. Persisted in
  // localStorage so it survives reloads - purely a per-browser view state.
  let nowDay = 1;
  let nowPeriod = 1;
  let nowFilterEnabled = false;
  const NOW_LS_KEY = "cameralm:now";
  let lastNowDimsHash = "";   // re-populate day/period dropdowns only on dim changes

  function loadNowFromStorage() {
    try {
      const raw = localStorage.getItem(NOW_LS_KEY);
      if (!raw) return;
      const obj = JSON.parse(raw);
      if (Number.isInteger(obj.day) && obj.day >= 1) nowDay = obj.day;
      if (Number.isInteger(obj.period) && obj.period >= 1) nowPeriod = obj.period;
      if (typeof obj.filter === "boolean") nowFilterEnabled = obj.filter;
    } catch (e) { /* corrupt localStorage entry - ignore, use defaults */ }
  }

  function saveNowToStorage() {
    try {
      localStorage.setItem(NOW_LS_KEY, JSON.stringify({
        day: nowDay, period: nowPeriod, filter: nowFilterEnabled,
      }));
    } catch (e) { /* private mode / quota - silently keep using in-memory state */ }
  }

  function currentScheduledBlock() {
    const blocks = state.scheduleDims.blocks;
    if (!blocks.length) return "";
    return blocksForDay(nowDay, blocks)[nowPeriod - 1] || "";
  }

  function currentScheduledClass() {
    const block = currentScheduledBlock();
    return (block && state.schedule[block]) || "";
  }

  function filterTargetClass() {
    // Treat the filter as "off" if it's flagged on but nothing is scheduled -
    // hiding everything would just confuse the user.
    if (!nowFilterEnabled) return null;
    return currentScheduledClass() || null;
  }

  const icons = {
    search: '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.5-3.5"></path></svg>',
    plus: '<svg viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>',
    edit: '<svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>',
    trash: '<svg viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="m19 6-1 14H6L5 6"></path></svg>',
    tag: '<svg viewBox="0 0 24 24"><path d="M20 13 11 22 2 13V4h9Z"></path><path d="M7 8h.01"></path></svg>',
    chevron: '<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>',
    folder: '<svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"></path></svg>',
    inbox: '<svg viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline><path d="M5.5 5h13l2 7v6a2 2 0 0 1-2 2H5.5a2 2 0 0 1-2-2v-6Z"></path></svg>',
    calendar: '<svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4"></path><path d="M8 2v4"></path><path d="M3 10h18"></path></svg>'
  };

  function mountIcons(root = document) {
    root.querySelectorAll("[data-icon]").forEach((el) => {
      el.innerHTML = icons[el.dataset.icon] || "";
    });
  }

  async function fetchState() {
    try {
      const response = await fetch("/api/state");
      const data = await response.json();
      state.people = data.people || [];
      state.classes = data.classes || [];
      state.schedule = data.schedule || {};
      if (data.schedule_dims && Array.isArray(data.schedule_dims.blocks)) {
        state.scheduleDims = data.schedule_dims;
      }
      render();
    } catch (error) {
      // Keep the last known state if the camera process is still starting.
    }
  }

  function thumbnailUrl(person) {
    return `/api/identity/${person.pid}/thumbnail?v=${person.thumbnail_version || 0}`;
  }

  function peopleById() {
    return new Map(state.people.map((person) => [person.pid, person]));
  }

  function matchesSearch(person, q) {
    if (!q) return true;
    if (person.name.toLowerCase().includes(q)) return true;
    return person.classes.some((name) => name.toLowerCase().includes(q));
  }

  function membersOf(className) {
    return state.people.filter((p) => p.classes.includes(className));
  }

  function unassignedPeople() {
    return state.people.filter((p) => p.classes.length === 0);
  }

  function render() {
    const searchInput = $("#searchInput");
    const q = (searchInput ? searchInput.value : searchQuery).trim().toLowerCase();

    const unassignedAll = unassignedPeople();
    const withImages = state.people.filter((p) => p.has_thumbnail).length;

    $("#peopleCount").textContent = state.people.length;
    $("#classCount").textContent = state.classes.length;
    $("#unassignedCount").textContent = unassignedAll.length;
    $("#imageCount").textContent = `${withImages}/${state.people.length}`;
    $("#searchClear").hidden = !(searchInput && searchInput.value);

    renderNow();
    renderSchedule();
    renderGroups(q, unassignedAll);
    mountIcons();
  }

  function renderNow() {
    const dims = state.scheduleDims;
    const days = dims.days;
    const blocks = dims.blocks;

    // Clamp Day / Period in case SCHEDULE_DAYS or block count changed since
    // the last save (or the localStorage value is from a different config).
    nowDay = Math.min(Math.max(1, nowDay), Math.max(1, days));
    nowPeriod = Math.min(Math.max(1, nowPeriod), Math.max(1, blocks.length));

    const daySel = $("#nowDay");
    const periodSel = $("#nowPeriod");
    // Re-populate the dropdown options only when the dimensions change, so the
    // 1.5 s poll doesn't fight the user mid-selection.
    const dimsHash = `${days}|${blocks.length}`;
    if (dimsHash !== lastNowDimsHash) {
      daySel.innerHTML = Array.from({ length: days }, (_, i) =>
        `<option value="${i + 1}">Day ${i + 1}</option>`
      ).join("");
      periodSel.innerHTML = Array.from({ length: blocks.length }, (_, i) =>
        `<option value="${i + 1}">Period ${i + 1}</option>`
      ).join("");
      lastNowDimsHash = dimsHash;
    }
    daySel.value = String(nowDay);
    periodSel.value = String(nowPeriod);

    const block = currentScheduledBlock();
    const className = currentScheduledClass();
    const members = className
      ? state.people.filter((p) => p.classes.includes(className)).length
      : 0;

    $("#nowBlock").textContent = block ? `Block ${block}` : "-";
    const classEl = $("#nowClass");
    classEl.textContent = className || "No class scheduled";
    classEl.classList.toggle("empty", !className);
    $("#nowCount").textContent = className
      ? `· ${members} ${members === 1 ? "person enrolled" : "people enrolled"}`
      : "";

    const toggleEl = $("#nowFilterToggle");
    const filterInput = $("#nowFilter");
    const canFilter = !!className;
    toggleEl.setAttribute("aria-disabled", canFilter ? "false" : "true");
    toggleEl.classList.toggle("active", nowFilterEnabled && canFilter);
    filterInput.disabled = !canFilter;
    filterInput.checked = nowFilterEnabled && canFilter;

    // Reflect the filter on the identities panel header.
    const badge = $("#filterBadge");
    const filterTarget = filterTargetClass();
    if (filterTarget) {
      badge.textContent = `Filtered: ${filterTarget}`;
      badge.hidden = false;
    } else {
      badge.hidden = true;
    }
  }

  // Block order for `day`, right-rotated by (day - 1) so the school's
  // chronological rotation (Day 1: A B C D, Day 2: D A B C, Day 3: C D A B, ...)
  // falls out of one function instead of being hardcoded per day.
  function blocksForDay(day, blocks) {
    const n = blocks.length;
    if (n === 0) return [];
    const shift = (((day - 1) % n) + n) % n;
    return blocks.slice(n - shift).concat(blocks.slice(0, n - shift));
  }

  function renderSchedule() {
    const dims = state.scheduleDims;
    const days = Array.from({ length: dims.days }, (_, i) => i + 1);
    const blocks = dims.blocks;
    const classNames = state.classes.map((c) => c.name);

    // Hash includes everything the render depends on; if nothing changed since
    // the last call, leave the existing DOM alone (an open <select> stays open).
    const hash = JSON.stringify({ d: dims, s: state.schedule, c: classNames });
    const filled = blocks.filter((b) => state.schedule[b]).length;
    $("#scheduleFilled").textContent = `${filled} / ${blocks.length} blocks filled`;
    $("#scheduleEmptyClasses").hidden = classNames.length > 0;
    if (hash === lastScheduleHash) return;
    lastScheduleHash = hash;

    $("#scheduleHeadRow").innerHTML =
      '<th scope="col" aria-hidden="true"></th>' +
      days.map((d) => `<th scope="col">Day ${d}</th>`).join("");

    // Rows = period of the day (1, 2, 3, ...). Which block fills each period
    // depends on the day's rotation; the block letter is rendered inside the
    // cell so the layout reads chronologically top-to-bottom.
    $("#scheduleBody").innerHTML = blocks.map((_unused, periodIdx) => {
      const period = periodIdx + 1;
      const cells = days.map((day) => {
        const block = blocksForDay(day, blocks)[periodIdx];
        const current = state.schedule[block] || "";
        const options = ['<option value="">-</option>']
          .concat(classNames.map((name) =>
            `<option value="${escapeAttr(name)}"${name === current ? " selected" : ""}>${escapeHtml(name)}</option>`
          ))
          .join("");
        return `<td>
          <div class="schedule-cell-wrap">
            <div class="schedule-cell-label">Block ${escapeHtml(block)}</div>
            <select class="schedule-cell" data-block="${escapeAttr(block)}" data-empty="${!current}" aria-label="Day ${day} Block ${escapeAttr(block)}">${options}</select>
          </div>
        </td>`;
      }).join("");
      return `<tr><th scope="row">${period}</th>${cells}</tr>`;
    }).join("");
  }

  function renderGroups(q, unassignedAll) {
    // "Now" filter (if on, and a class is scheduled): narrow to just that class
    // - every other class folder + Unassigned are hidden until the toggle is
    // cleared, so the user sees only who's enrolled in the live class.
    const filterTarget = filterTargetClass();
    const parts = [];
    let anyVisible = false;

    for (const cls of state.classes) {
      if (filterTarget && cls.name !== filterTarget) continue;
      const allMembers = membersOf(cls.name);
      const matched = q ? allMembers.filter((p) => matchesSearch(p, q)) : allMembers;
      if (q && matched.length === 0) continue;          // hide non-matching groups during a search
      anyVisible = true;
      // Auto-open the filtered class, the matched search results, or whatever
      // the user manually opened - in that order.
      const open = filterTarget
        ? cls.name === filterTarget
        : (q ? matched.length > 0 : expandedClasses.has(cls.name));
      parts.push(renderGroup({
        kind: "class",
        key: cls.name,
        label: cls.name,
        iconKey: "folder",
        members: matched,
        totalMembers: allMembers.length,
        isOpen: open,
        deletable: true,
        droppable: true
      }));
    }

    // Suppress Unassigned when the filter is on - it's not the scheduled class.
    if (!filterTarget) {
      const matchedUnassigned = q ? unassignedAll.filter((p) => matchesSearch(p, q)) : unassignedAll;
      if (!q || matchedUnassigned.length > 0) {
        anyVisible = true;
        const open = q ? matchedUnassigned.length > 0 : expandedUnassigned;
        parts.push(renderGroup({
          kind: "unassigned",
          key: UNASSIGNED_KEY,
          label: "Unassigned",
          iconKey: "inbox",
          members: matchedUnassigned,
          totalMembers: unassignedAll.length,
          isOpen: open,
          deletable: false,
          droppable: false
        }));
      }
    }

    $("#classGroups").innerHTML = parts.join("");
    const emptyEl = $("#groupsEmpty");
    if (filterTarget && !anyVisible) {
      emptyEl.textContent = `No identities are enrolled in "${filterTarget}" yet.`;
      emptyEl.hidden = false;
    } else if (!anyVisible) {
      emptyEl.textContent = "No matching identities.";
      emptyEl.hidden = false;
    } else {
      emptyEl.hidden = true;
    }
  }

  function renderGroup({ kind, key, label, iconKey, members, totalMembers, isOpen, deletable, droppable }) {
    const safeKey = escapeAttr(key);
    const safeLabel = escapeHtml(label);
    const dropAttr = droppable ? ` data-drop-class="${safeKey}"` : "";
    const body = members.length
      ? `<div class="group-grid">${members.map(renderPersonCard).join("")}</div>`
      : `<div class="group-empty">${searchQuery ? "No matches in this group." : (kind === "unassigned" ? "Every identity belongs to a class. " : "No identities in this class yet. Drag a card here to add one.")}</div>`;
    return `
      <details class="class-group ${kind === "unassigned" ? "unassigned-group" : ""}" ${isOpen ? "open" : ""} data-group-key="${safeKey}" data-group-kind="${kind}">
        <summary${dropAttr}>
          <span class="chevron" data-icon="chevron"></span>
          <span class="group-icon" data-icon="${iconKey}"></span>
          <span class="group-name" title="${safeLabel}">${safeLabel}</span>
          <span class="group-count">${totalMembers}</span>
          <span class="group-actions">
            ${deletable ? `<button class="icon-btn danger" type="button" title="Delete class" data-action="delete-class" data-class="${safeKey}" aria-label="Delete ${safeLabel}"><span data-icon="trash"></span></button>` : ""}
          </span>
        </summary>
        <div class="group-body">${body}</div>
      </details>
    `;
  }

  function renderPersonCard(person) {
    return `
      <article class="person-card" draggable="true" data-pid="${person.pid}">
        <div class="thumb-wrap">
          <img src="${thumbnailUrl(person)}" alt="${escapeAttr(person.name)}">
          <span class="match-pill">${person.n_face} face / ${person.n_body} body / ${person.n_partial || 0} partial</span>
          ${person.has_thumbnail ? "" : '<span class="thumb-status">Waiting for image</span>'}
        </div>
        <div class="person-body">
          <div class="person-title">
            <div class="min-0">
              <div class="person-name" title="${escapeAttr(person.name)}">${escapeHtml(person.name)}</div>
              <div class="person-meta">ID ${person.pid}</div>
            </div>
            <div class="icon-row">
              <button class="icon-btn" type="button" title="Rename" data-action="rename-person" data-pid="${person.pid}" data-name="${escapeAttr(person.name)}"><span data-icon="edit"></span></button>
              <button class="icon-btn" type="button" title="Add class" data-action="add-person-class" data-pid="${person.pid}"><span data-icon="tag"></span></button>
              <button class="icon-btn danger" type="button" title="Delete" data-action="delete-person" data-pid="${person.pid}"><span data-icon="trash"></span></button>
            </div>
          </div>
          <div class="chips">
            ${person.classes.length ? person.classes.map((name) => `
              <span class="chip">
                <span>${escapeHtml(name)}</span>
                <button type="button" title="Remove ${escapeAttr(name)}" data-action="remove-person-class" data-pid="${person.pid}" data-class="${escapeAttr(name)}">x</button>
              </span>
            `).join("") : '<span class="muted">No classes</span>'}
          </div>
        </div>
      </article>
    `;
  }

  async function createClass(name) {
    if (!name) return;
    await fetch("/api/class", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name })
    });
    // Surface a newly-created (empty) class by opening it on next render.
    expandedClasses.add(name);
    await fetchState();
  }

  async function assignToClass(pid, className) {
    if (!pid || !className) return;
    await fetch(`/api/identity/${pid}/classes`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: className })
    });
    // Open the destination folder so the user can see the drop landed.
    expandedClasses.add(className);
    await fetchState();
  }

  async function removeFromClass(pid, className) {
    await fetch(`/api/identity/${pid}/classes/${encodeURIComponent(className)}`, { method: "DELETE" });
    await fetchState();
  }

  async function renamePerson(pid, currentName) {
    const name = prompt("New name", currentName);
    if (!name || name.trim() === currentName) return;
    await fetch(`/api/identity/${pid}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name.trim() })
    });
    await fetchState();
  }

  async function deletePerson(pid) {
    if (!confirm("Delete this person and all embeddings?")) return;
    await fetch(`/api/identity/${pid}`, { method: "DELETE" });
    await fetchState();
  }

  async function deleteClass(name) {
    if (!confirm(`Delete class "${name}"?`)) return;
    await fetch(`/api/class/${encodeURIComponent(name)}`, { method: "DELETE" });
    expandedClasses.delete(name);
    await fetchState();
  }

  async function promptAssign(pid) {
    const current = peopleById().get(pid);
    const suggestion = state.classes[0]?.name || "";
    const className = prompt(`Class for ${current?.name || "identity"}`, suggestion);
    if (!className || !className.trim()) return;
    await assignToClass(pid, className.trim());
  }

  async function setScheduleSlot(block, className) {
    await fetch(`/api/schedule/${encodeURIComponent(block)}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ class: className })
    });
    await fetchState();
  }

  // --- Event delegation ---

  document.addEventListener("click", (event) => {
    const target = event.target.closest("[data-action]");
    if (!target) return;

    // An action button inside a <summary> would otherwise toggle the folder
    // along with firing its own action - block both.
    if (event.target.closest("summary")) {
      event.preventDefault();
      event.stopPropagation();
    }

    const action = target.dataset.action;
    const pid = Number(target.dataset.pid);
    const className = target.dataset.class;

    if (action === "delete-class") return deleteClass(className);
    if (action === "rename-person") return renamePerson(pid, target.dataset.name);
    if (action === "add-person-class") return promptAssign(pid);
    if (action === "delete-person") return deletePerson(pid);
    if (action === "remove-person-class") return removeFromClass(pid, className);
    if (action === "expand-all") {
      state.classes.forEach((c) => expandedClasses.add(c.name));
      expandedUnassigned = true;
      return render();
    }
    if (action === "collapse-all") {
      expandedClasses.clear();
      expandedUnassigned = false;
      return render();
    }
  });

  // The <details> "toggle" event doesn't bubble, so listen in capture phase.
  // Folder state lives in JS Sets - the 1.5 s poll/rebuild can't drop it.
  document.addEventListener("toggle", (event) => {
    const det = event.target.closest && event.target.closest("details.class-group");
    if (!det) return;
    if (searchQuery) return;     // search-driven auto-expansion is transient; don't persist
    const key = det.dataset.groupKey;
    const kind = det.dataset.groupKind;
    if (kind === "unassigned") {
      expandedUnassigned = det.open;
    } else if (det.open) {
      expandedClasses.add(key);
    } else {
      expandedClasses.delete(key);
    }
  }, true);

  // --- Drag-and-drop: drop a person card onto a class folder header ---

  document.addEventListener("dragstart", (event) => {
    const card = event.target.closest(".person-card");
    if (!card) return;
    event.dataTransfer.setData("text/pid", card.dataset.pid);
    event.dataTransfer.effectAllowed = "move";
    card.classList.add("dragging");
  });

  document.addEventListener("dragend", (event) => {
    const card = event.target.closest(".person-card");
    if (card) card.classList.remove("dragging");
    document.querySelectorAll(".dragover").forEach((el) => el.classList.remove("dragover"));
  });

  document.addEventListener("dragover", (event) => {
    const drop = event.target.closest("[data-drop-class]");
    if (!drop) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = "move";
    drop.classList.add("dragover");
  });

  document.addEventListener("dragleave", (event) => {
    const drop = event.target.closest("[data-drop-class]");
    if (drop && !drop.contains(event.relatedTarget)) drop.classList.remove("dragover");
  });

  document.addEventListener("drop", async (event) => {
    const drop = event.target.closest("[data-drop-class]");
    if (!drop) return;
    event.preventDefault();
    drop.classList.remove("dragover");
    await assignToClass(Number(event.dataTransfer.getData("text/pid")), drop.dataset.dropClass);
  });

  // --- Forms / search ---

  $("#classForm").addEventListener("submit", async (event) => {
    event.preventDefault();
    const input = $("#newClassInput");
    const name = input.value.trim();
    input.value = "";
    await createClass(name);
  });

  $("#searchInput").addEventListener("input", (event) => {
    searchQuery = event.target.value;
    render();
  });
  $("#searchInput").addEventListener("change", (event) => {
    searchQuery = event.target.value;
    render();
  });
  $("#searchClear").addEventListener("click", () => {
    const input = $("#searchInput");
    input.value = "";
    searchQuery = "";
    render();
    input.focus();
  });

  document.addEventListener("change", async (event) => {
    const cell = event.target.closest(".schedule-cell");
    if (!cell) return;
    const block = cell.dataset.block;
    const value = cell.value;
    cell.dataset.empty = String(!value);   // reflect immediately for the dim style
    await setScheduleSlot(block, value);
  });

  $("#nowDay").addEventListener("change", (event) => {
    nowDay = Number(event.target.value);
    saveNowToStorage();
    render();
  });
  $("#nowPeriod").addEventListener("change", (event) => {
    nowPeriod = Number(event.target.value);
    saveNowToStorage();
    render();
  });
  $("#nowFilter").addEventListener("change", (event) => {
    nowFilterEnabled = event.target.checked;
    // Turning the filter on: open the target folder so the members are visible
    // the instant the rest of the panel narrows to it.
    if (nowFilterEnabled) {
      const target = currentScheduledClass();
      if (target) expandedClasses.add(target);
    }
    saveNowToStorage();
    render();
  });

  // --- Utilities ---

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[char]));
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, "&#96;");
  }

  loadNowFromStorage();
  mountIcons();
  fetchState();
  setInterval(fetchState, 1500);
</script>
</body>
</html>
