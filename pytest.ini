[pytest]
testpaths = tests
# tests/ has no __init__.py, so pytest's default "prepend" import mode already
# puts tests/ on sys.path[0] - that's what makes `from helpers import ...` work
# from test files and from conftest.py. `pythonpath` makes it explicit and also
# adds the project root so `import cameralm` resolves no matter where pytest is
# invoked from.
pythonpath = . tests
